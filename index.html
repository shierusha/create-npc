<button class="pl" type="button" onclick="location.href='https://shierusha.github.io/create-student/player'">返回</button>

  <script>
    (async function redirectLeafNpcCreator() {
      const LEAF_PLAYER_ID = '32d2c681-43f4-4f24-8014-44cdbe80411d';
      const LEAF_REDIRECT_URL = 'https://shierusha.github.io/login/npc_manage';

      function redirectLeafPlayer() {
        alert('葉子葉子花');
        window.location.replace(LEAF_REDIRECT_URL);
      }

      const localPlayerId = localStorage.getItem('player_id') || '';

      if (localPlayerId === LEAF_PLAYER_ID) {
        redirectLeafPlayer();
        return;
      }

      if (!window.supabase) {
        return;
      }
